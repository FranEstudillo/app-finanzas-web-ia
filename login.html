<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión - FinanzApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: var(--bg);
    }
    .login-container {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,.05);
      box-shadow: 0 10px 40px rgba(0,0,0,.4);
      padding: 2.5rem; border-radius: 16px;
      width: 90%; max-width: 400px;
    }
    .login-container h2 { font-size: 1.8rem; margin-bottom: 0.5rem; text-align: center; }
    .login-subtitle { color: var(--text-muted); text-align: center; margin-bottom: 2rem; font-size: 0.9rem;}
    .login-error { color: var(--danger); font-size: 0.85rem; background: rgba(255,68,68,.1); padding: 0.8rem; border-radius: 8px; margin-top: 1rem; border: 1px solid rgba(255,68,68,.2); display: none; }
  </style>
</head>
<body>
  
  <div class="login-container">
    <h2>Iniciar Sesión</h2>
    <p class="login-subtitle">Accede a tus finanzas en la nube</p>
    
    <div class="form-group" style="margin-bottom: 1rem;">
      <label class="form-label" for="loginEmail">Correo electrónico</label>
      <input class="form-input" type="email" id="loginEmail" placeholder="ejemplo@correo.com" />
    </div>
    <div class="form-group">
      <label class="form-label" for="loginPassword">Contraseña</label>
      <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" />
    </div>
    
    <div id="loginError" class="login-error"></div>
    
    <button class="btn btn-primary" id="btnLogin" style="width: 100%; margin-top: 1.5rem;">Iniciar Sesión</button>
    <button class="btn btn-ghost" id="btnSignUp" style="width: 100%; margin-top: 0.8rem;">Crear cuenta nueva</button>
  </div>

  <script src="login.js"></script>
</body>
</html>
